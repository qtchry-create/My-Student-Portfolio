<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coquette Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: linear-gradient(135deg, #ffe6f0, #fff0f5, #e6f2ff);
      position: relative;
      text-align: center;
      color: #4b2c35;
    }

    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, rgba(255, 182, 193, 0.25), transparent 60%);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      top: 50%;
      transform: translateY(-50%);
      padding: 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 44px;
      color: #d46a92;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      color: #6b3b4c;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 28px;
      background: linear-gradient(135deg, #ff9ecb, #ffb6d5);
      color: white;
      border-radius: 50px;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
      transition: 0.3s;
      box-shadow: 0 5px 15px rgba(255, 182, 193, 0.4);
    }

    .btn:hover {
      transform: scale(1.08);
    }

    /* ☁️ CLOUD ANIMATION */
    .cloud {
      position: fixed;
      top: 10%;
      left: -200px;
      width: 120px;
      height: 60px;
      background: #ffffff;
      border-radius: 50px;
      opacity: 0.7;
      filter: blur(1px);
      z-index: 0;
      animation: floatCloud linear infinite;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: #ffffff;
      border-radius: 50%;
    }

    .cloud::before {
      width: 60px;
      height: 60px;
      top: -20px;
      left: 10px;
    }

    .cloud::after {
      width: 70px;
      height: 70px;
      top: -25px;
      right: 10px;
    }

    @keyframes floatCloud {
      0% {
        transform: translateX(-20vw);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
      }
      100% {
        transform: translateX(120vw);
        opacity: 0;
      }
    }

  </style>
</head>

<body>

<script>
  // Cloud generator
  for (let i = 0; i < 8; i++) {
    let cloud = document.createElement("div");
    cloud.className = "cloud";

    cloud.style.top = Math.random() * 70 + "vh";
    cloud.style.transform = `scale(${Math.random() * 0.8 + 0.6})`;
    cloud.style.animationDuration = (Math.random() * 20 + 15) + "s";
    cloud.style.animationDelay = Math.random() * 10 + "s";

    document.body.appendChild(cloud);
  }
</script>

<div class="container">
  <h1>Welcome! I'm Cherry! 💕</h1>
  <p>BSIT Student | Future Web Developer</p>

  <a href="portfolio.pdf" target="_blank" class="btn">
    VIEW MY PORTFOLIO
  </a>
</div>

</body>
</html>
